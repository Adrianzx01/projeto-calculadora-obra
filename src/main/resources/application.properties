spring.application.name=projeto-calculadora

# ===== Banco de dados H2 (em memoria) =====
# (a auto-configuracao do Spring nao funciona junto com o JSF/JoinFaces)
spring.datasource.url=jdbc:h2:mem:obradb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# ===== JSF / PrimeFaces (via JoinFaces) =====
# Modo de desenvolvimento: mostra erros detalhados nas paginas
joinfaces.faces.project-stage=Development
# Tema visual do PrimeFaces
joinfaces.primefaces.theme=saga

