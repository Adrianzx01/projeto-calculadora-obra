spring.application.name=projeto-calculadora
# Habilita o console do banco de dados no navegador
spring.h2.console.enabled=true
# Define o caminho do acesso
spring.h2.console.path=/h2-console

# Configurações do Banco
spring.datasource.url=jdbc:h2:mem:obradb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cria as tabelas conforme as classes @Entity
spring.jpa.hibernate.ddl-auto=update
